apiVersion: workspace.devfile.io/v1alpha2
kind: DevWorkspaceTemplate
metadata:
  name: ttyd-editor
  labels:
    app: che-mcp-server
spec:
  commands:
    - id: init-ttyd
      apply:
        component: ttyd-injector
  events:
    preStart:
      - init-ttyd
  components:
    - name: ttyd-injector
      container:
        image: docker.io/tsl0922/ttyd:1.7.7-alpine
        command:
          - sh
          - -c
          - cp /usr/bin/ttyd /ttyd-vol/ttyd && chmod +x /ttyd-vol/ttyd
        memoryLimit: 64Mi
        memoryRequest: 16Mi
        cpuLimit: 500m
        cpuRequest: 30m
        volumeMounts:
          - name: ttyd-volume
            path: /ttyd-vol
    - name: ttyd-runtime
      attributes:
        controller.devfile.io/container-contribution: true
      container:
        image: docker.io/tsl0922/ttyd:1.7.7-alpine
        memoryLimit: 128Mi
        memoryRequest: 32Mi
        cpuLimit: 500m
        cpuRequest: 30m
        endpoints:
          - name: ttyd-terminal
            targetPort: 7681
            exposure: public
            protocol: https
            attributes:
              type: main
              cookiesAuthEnabled: true
              discoverable: false
              urlRewriteSupported: true
        volumeMounts:
          - name: ttyd-volume
            path: /ttyd-vol
    - name: ttyd-volume
      volume:
        ephemeral: true
