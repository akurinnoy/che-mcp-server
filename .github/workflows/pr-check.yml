name: PR check

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build (typecheck)
        run: npm run build

      - name: Run tests
        run: npm test

  build-image:
    runs-on: ubuntu-latest
    needs: quality
    env:
      IMAGE: quay.io/che-incubator/che-mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies and build
        run: npm ci && npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:pr-${{ github.event.pull_request.number }}

      - name: Set tag expiration (14 days)
        run: |
          EXPIRATION=$(date -u -d '+14 days' +%s)
          curl -s -X PUT \
            -u "${{ secrets.QUAY_USERNAME }}:${{ secrets.QUAY_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "{\"expiration\": ${EXPIRATION}}" \
            "https://quay.io/api/v1/repository/che-incubator/che-mcp-server/tag/pr-${{ github.event.pull_request.number }}"
